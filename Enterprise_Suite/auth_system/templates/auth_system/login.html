{% extends 'base.html' %}

{% block title %}Login | Enterprise Suite{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card animate-in" style="width: 100%; max-width: 450px;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-gray);">Username</label>
                <input type="text" name="username"
                    style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white;"
                    required>
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-gray);">Password</label>
                <input type="password" name="password"
                    style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white;"
                    required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; color: var(--text-gray);">
            Don't have an account? <a href="{% url 'auth_system:signup' %}"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
