{% extends 'base.html' %}
{% block title %}Reviews | Creative Hub{% endblock %}
{% block content %}
<div class="animate-in" style="padding:6rem 5%; max-width:1100px; margin:0 auto;">
    <h2 style="font-family:'Playfair Display',serif; font-size:3.5rem; margin-bottom:5rem; text-align:center;">Community
        <span style="color:var(--primary)">Reviews</span></h2>
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:3rem;">
        {% for item in items %}
        <a href="{% url 'review_system:item_detail' item.pk %}" style="text-decoration:none; color:inherit;">
            <div class="creative-card">
                <div style="font-size:3rem; margin-bottom:1.5rem;">⭐</div>
                <h3 style="font-size:1.5rem; margin-bottom:0.75rem;">{{ item.name }}</h3>
                <p style="color:var(--text-gray); font-size:0.9rem; margin-bottom:2rem;">{{ item.category }}</p>
                <div class="card-footer" style="padding-top:1rem; border-top:1px dashed #eee;">
                    <span class="explore-btn">See Reviews ➔</span>
                    <span style="font-size:0.8rem; color:var(--text-gray);">{{ item.reviews.count }} reviews</span>
                </div>
            </div>
        </a>
        {% empty %}
        <div style="grid-column:1/-1; text-align:center; padding:6rem 0; color:var(--text-gray);">
            <div style="font-size:4rem; margin-bottom:1.5rem;">⭐</div>
            <h3>No items to review yet.</h3>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
